    <title>Elyadypa | Official</title>
    <style>
        :root {
            --bg-color: #030406;
            --card-bg: rgba(255, 255, 255, 0.04);
            --accent-blue: #007aff;
            --text-main: #ffffff;
            --text-dim: #888da0;
            --halo-color: rgba(0, 122, 255, 0.4); /* Синее гало-свечение */
            --glow-color: rgba(255, 255, 255, 0.7); /* Белое свечение текста */
            --step-num-color: #007aff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 400px; width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* Переключатель языка (справа вверху) */
        .lang-switcher-container { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .lang-switcher { display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .lang-btn { background: none; border: none; color: var(--text-dim); font-weight: 700; cursor: pointer; padding: 6px 12px; border-radius: 15px; font-size: 13px; }
        .lang-btn.active { color: white; background: rgba(255,255,255,0.1); }

        /* Заголовок */
        header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 30px; }
        .avatar-halo-container { position: relative; margin-bottom: 15px; }
        .avatar {
            width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid white;
            /* Я использую фото с image_0.png как твою аватарку */
            background-image: url('myphoto.png'); /* Если фото myphoto.png лежит рядом в репозитории */
            background-size: cover; background-position: center;
            /* Эффект Гало-свечения (image_18.png) */
            box-shadow: 0 0 30px 10px var(--halo-color);
        }
        .guarantor-name { font-weight: 800; font-style: italic; font-size: 26px; margin-bottom: 5px; }
        
        /* Эффект подсветки текста гаранта (как ты просил) */
        .guarantor-tag { color: var(--accent-blue); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; text-shadow: 0 0 8px var(--accent-blue); }
        .guarantor-tag-desc { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 0 6px var(--glow-color); }

        .info-title { font-weight: 800; font-style: italic; font-size: 20px; margin-bottom: 15px; }
        .info-text { color: var(--text-dim); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
